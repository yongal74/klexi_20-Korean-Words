name: CI — Test & TypeCheck

on:
  push:
    branches: [main, 'agent/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & TypeCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:ci

      - name: Check no Replit references (migration 완료 후)
        if: github.ref == 'refs/heads/main'
        run: |
          if grep -r "replit_integrations\|REPLIT_DEV_DOMAIN\|REPLIT_DOMAINS" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "❌ Replit 참조 발견! 제거 후 다시 푸시하세요."
            exit 1
          else
            echo "✅ Replit 참조 없음"
          fi

  build-check:
    name: EAS Build Check (Android)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android Production)
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}
